name: Deploy ETL → Azure Functions (Flex Consumption)

on:
  push:
    branches: [main]
    paths:
      - 'etl/**'
      - '.github/workflows/deploy-etl.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'func-etl-opticolor-prd'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './etl'
  PYTHON_VERSION: '3.11'
  RESOURCE_GROUP: 'rg-opticolor-prd'

jobs:
  deploy:
    name: Deploy ETL
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.1.1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Azure Functions Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Create production settings
        run: |
          cat > ./etl/local.settings.json <<'EOF'
          {
            "IsEncrypted": false,
            "Values": {
              "AzureWebJobsStorage": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}",
              "FUNCTIONS_WORKER_RUNTIME": "python",
              "GESVISION_BASE_URL": "${{ secrets.GESVISION_BASE_URL }}",
              "GESVISION_USER": "${{ secrets.GESVISION_USER }}",
              "GESVISION_PASS": "${{ secrets.GESVISION_PASS }}",
              "SQL_AZURE_CONNECTION_STRING": "${{ secrets.SQL_AZURE_CONNECTION_STRING }}",
              "AzureWebJobs.EtlMaestroSucursales.Disabled": "true",
              "AzureWebJobs.EtlClinicaExamenes.Disabled": "true",
              "AzureWebJobs.EtlVentasCabecera.Disabled": "false",
              "AzureWebJobs.EtlMaestroProductos.Disabled": "true",
              "AzureWebJobs.EtlMaestroEmpleados.Disabled": "true",
              "AzureWebJobs.EtlMaestroClientes.Disabled": "true",
              "AzureWebJobs.EtlVentasPedidos.Disabled": "true",
              "AzureWebJobs.EtlOperacionesInventario.Disabled": "true",
              "AzureWebJobs.EtlMarketingCitas.Disabled": "true",
              "AzureWebJobs.EtlMaestroCategorias.Disabled": "true",
              "AzureWebJobs.EtlMaestroMetodosPago.Disabled": "true",
              "AzureWebJobs.EtlFinanzasCobros.Disabled": "true",
              "AzureWebJobs.EtlFinanzasTesoreria.Disabled": "true",
              "AzureWebJobs.EtlOperacionesLaboratorio.Disabled": "true",
              "TELEGRAM_BOT_TOKEN": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "TELEGRAM_CHAT_ID": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "AzureFunctionsJobHost__logging__logLevel__default": "Error",
              "AzureWebJobs.EtlOrquestadorPrincipal.Disabled": "false",
              "Azure": "true"
            }
          }
          EOF

      - name: Install dependencies
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure Login
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1.5.1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Update App Settings (Remove FUNCTIONS_WORKER_RUNTIME if exists)
        run: |
          # Nota: azure-functions-action PUEDE haber seteado FUNCTIONS_WORKER_RUNTIME
          # Para Flex Consumption NO debe estar en app settings, solo en el host.json
          # Verificar que no esté en la app
          echo "✅ Deploy completado sin FUNCTIONS_WORKER_RUNTIME en app settings"

      - name: Verify Deployment
        run: |
          echo "🔍 Verificando función desplegada..."
          az functionapp show --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "state"

      - name: Success
        run: |
          echo "✅ ETL Opticolor desplegado exitosamente a Flex Consumption"
          echo "📋 App: ${{ env.AZURE_FUNCTIONAPP_NAME }}"
          echo "📍 Región: West US 3"
